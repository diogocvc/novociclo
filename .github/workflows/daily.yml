name: Daily Pipeline
on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx automation/daily-pipeline.ts
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
